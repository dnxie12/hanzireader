<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="theme-color" content="#1E293B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com/firebasejs/ https://apis.google.com/; style-src 'self' 'unsafe-inline'; img-src 'self' https://*.googleusercontent.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://identitytoolkit.googleapis.com; frame-src https://accounts.google.com https://*.firebaseapp.com;">
  <title>Hanzi Reader</title>
  <meta name="application-name" content="Hanzi Reader">
  <meta property="og:site_name" content="Hanzi Reader">
  <meta property="og:title" content="Hanzi Reader">
  <meta name="description" content="Chinese character reading flashcards for heritage Mandarin speakers. Learn to recognize 2,400 characters with spaced repetition and contextual reading practice.">
  <meta property="og:description" content="Chinese character reading flashcards for heritage Mandarin speakers. Learn to recognize 2,400 characters with spaced repetition and contextual reading practice.">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Screens -->
    <div id="screen-home" class="screen active">
      <h1>Hanzi Reader</h1>
      <p>Chinese character reading flashcards for heritage Mandarin speakers. Learn to recognize 2,400 characters with spaced repetition and contextual reading practice.</p>
    </div>
    <div id="screen-read" class="screen"></div>
    <div id="screen-study" class="screen"></div>
    <div id="screen-browse" class="screen"></div>
    <div id="screen-stats" class="screen"></div>

    <!-- Placement Test Overlay -->
    <div id="screen-placement" class="placement-overlay"></div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal-overlay">
      <div class="modal-content"></div>
    </div>
  </div>

  <!-- Tab Bar -->
  <nav class="tab-bar" aria-label="Main navigation">
    <div class="tab-bar-inner">
      <button class="tab" data-screen="home" aria-label="Home">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </button>
      <button class="tab" data-screen="read" aria-label="Read">
        <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>Read</span>
      </button>
      <button class="tab" data-screen="study" aria-label="Study">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span>Study</span>
      </button>
      <button class="tab" data-screen="browse" aria-label="Browse">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Browse</span>
      </button>
      <button class="tab" data-screen="stats" aria-label="Stats">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Stats</span>
      </button>
    </div>
  </nav>

  <div style="position:fixed; bottom:0; left:0; right:0; text-align:center; padding:4px; font-size:11px; z-index:0;">
    <a href="privacy.html" style="color:var(--text-muted); text-decoration:none;">Privacy</a>
  </div>

  <!-- Scripts (order matters: data first, then modules, then screens, then app) -->
  <script src="data/char_data.js"></script>
  <script src="data/snippets.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/vendor/fsrs.umd.js"></script>
  <script src="js/srs.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/home.js"></script>
  <script src="js/study.js"></script>
  <script src="js/read.js"></script>
  <script src="js/browse.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/placement.js"></script>
  <script src="js/app.js"></script>

  <script src="js/sw-register.js"></script>
</body>
</html>
