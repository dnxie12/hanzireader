<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
      script-src 'self' https://www.gstatic.com/firebasejs/ https://apis.google.com/;
      style-src 'unsafe-inline';
      frame-src https://accounts.google.com https://*.firebaseapp.com;
      connect-src https://*.googleapis.com https://*.firebaseio.com https://identitytoolkit.googleapis.com;">
  <title>Sign In — Hanzi Reader</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1E293B; color: #E2E8F0;
    }
    @media (prefers-color-scheme: light) {
      body { background: #F8FAFC; color: #1E293B; }
      #status { color: #64748B; }
      #status.ok { color: #16A34A; }
      #status.err { color: #DC2626; }
      #version { color: #94A3B8; }
    }
    .card {
      text-align: center; padding: 2rem; max-width: 320px;
    }
    .card h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    #status { font-size: 0.95rem; line-height: 1.5; color: #94A3B8; }
    #status.ok { color: #4ADE80; }
    #status.err { color: #F87171; }
    button {
      margin-top: 1rem; padding: 0.5rem 1.25rem; border: none; border-radius: 6px;
      background: #3B82F6; color: #fff; font-size: 0.95rem; cursor: pointer; display: none;
    }
    #version { font-size: 11px; margin-top: 1.5rem; color: #475569; }
    #cancel { display: none; margin-top: 1rem; font-size: 0.85rem; color: #94A3B8; text-decoration: none; }
    #cancel:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hanzi Reader</h1>
    <div id="status">Signing in with Google…</div>
    <button id="retry">Try Again</button>
    <a href="#" id="cancel">Cancel</a>
    <div id="version">auth v8</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
